name: Build Geode Mod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: '1.0.2'
  push:
    branches:
      - "main"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: macOS
          os: macos-latest
        - name: iOS
          os: macos-latest
          target: iOS
        - name: Android32
          os: ubuntu-latest
          target: Android32
        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          build-config: Release

  package:
    name: Package and Release
    runs-on: ubuntu-latest
    needs: ['build']
    # Fix 1: Add Write Permissions for the GITHUB_TOKEN
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Combine builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Prepare changelog
        id: changelog
        run: |
          python3 - <<'EOF'
          import re, sys, os

          # Fix 2: Fallback to branch/tag name if manual input is empty
          version = "${{ github.event.inputs.version }}" or "${{ github.ref_name }}"
          # Clean 'v' prefix so 'v1.0.2' matches '## 1.0.2' in changelog.md
          version = version.lstrip('v')
          
          changelog_path = "changelog.md"

          if not os.path.exists(changelog_path):
              print(f"::error::changelog.md not found.")
              sys.exit(1)

          with open(changelog_path, "r", encoding="utf-8") as f:
              changelog = f.read()

          # Finds the section under the version header and stops at the next header
          pattern = rf"(?m)^## {re.escape(version)}\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, changelog, re.DOTALL)

          if not match:
              print(f"::error::Changelog entry for '{version}' not found in changelog.md")
              sys.exit(1)

          section = match.group(1).strip()
          
          # Optional: Converts Geode color tags to bold for GitHub Release view
          section = re.sub(r"<c[a-zA-Z]>", "**", section)
          section = re.sub(r"</c>", "**", section)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"changelog<<__CHANGELOG_EOF__\n{section}\n__CHANGELOG_EOF__\n")
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Fix 3: Ensure name and tag are never empty
          name: ${{ github.event.inputs.version || github.ref_name }}
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ steps.build.outputs.build-output }}/*.geode
