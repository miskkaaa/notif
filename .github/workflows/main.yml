name: Build Geode Mod

# stole the source code from https://github.com/EclipseMenu/EclipseMenu/blob/main/.github/workflows/publish.yml and i forced an ai like its the 1800's to put these together (thanks eclipse menu

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3)'
        required: true
        default: '1.0.2'
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: macOS
          os: macos-latest
        - name: iOS
          os: macos-latest
          target: iOS
        - name: Android32
          os: ubuntu-latest
          target: Android32
        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          # Recommended for releases:
          build-config: Release

  package:
    name: Package and Release
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Combine builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - name: Prepare changelog
        id: changelog
        run: |
          python3 - <<'EOF'
          import re, sys, os

          version = "${{ github.event.inputs.version }}"
          changelog_path = "CHANELOG.md"

          if not os.path.exists(changelog_path):
              print(f"::error::changelog.md not found.")
              sys.exit(1)

          with open(changelog_path, "r", encoding="utf-8") as f:
              changelog = f.read()

          # Finds the section under the version header and stops at the next header
          pattern = rf"(?m)^## {re.escape(version)}\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, changelog, re.DOTALL)

          if not match:
              print(f"::error::Changelog entry for '{version}' not found. Make sure header is '## {version}'")
              sys.exit(1)

          section = match.group(1).strip()
          
          # Optional: Converts Geode color tags to bold for GitHub Release view
          section = re.sub(r"<c[a-zA-Z]>", "**", section)
          section = re.sub(r"</c>", "**", section)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"changelog<<__CHANGELOG_EOF__\n{section}\n__CHANGELOG_EOF__\n")
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ steps.build.outputs.build-output }}/*.geode
            ${{ steps.build.outputs.build-output }}/*.pdb
