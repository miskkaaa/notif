name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: macOS
          os: macos-latest
        - name: iOS
          os: macos-latest
          target: iOS
        - name: Android32
          os: ubuntu-latest
          target: Android32
        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}
          build-config: Release

  package:
    name: Package and Release
    runs-on: ubuntu-latest
    needs: ['build']
    # Fix 1: Add Write Permissions for the GITHUB_TOKEN
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Combine builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

      - name: Prepare changelog
        id: changelog
        run: |
          python3 - <<'EOF'
          import re, sys, os
          changelog_path = "changelog.md"
          if not os.path.exists(changelog_path):
              print(f"::error::changelog.md not found.")
              sys.exit(1)
          with open(changelog_path, "r", encoding="utf-8") as f:
              content = f.read()
          # grab first ##
          m = re.search(r"^## (.+)", content, re.MULTILINE)
          if not m:
              print("::error::No version header found in changelog.md")
              sys.exit(1)
          version = m.group(1).strip()
          pattern = rf"(?m)^## {re.escape(version)}\n(.*?)(?=^## |\Z)"
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print(f"::error::Could not extract changelog body for '{version}'")
              sys.exit(1)
          section = match.group(1).strip()
          section = re.sub(r"<c[a-zA-Z]>", "**", section)
          section = re.sub(r"</c>", "**", section)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"version={version}\n")
              f.write(f"changelog<<__CHANGELOG_EOF__\n{section}\n__CHANGELOG_EOF__\n")
          EOF
          
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Fix 3: Ensure name and tag are never empty
          name: ${{ steps.changelog.outputs.version }}
          tag_name: ${{ steps.changelog.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ steps.build.outputs.build-output }}/*.geode
